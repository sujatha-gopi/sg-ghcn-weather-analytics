version: "3"
services:
  kestra:
    image: kestra/kestra:latest
    pull_policy: always
    user: "root"
    command: server standalone
    volumes:
      - kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ${GCP_KEY_PATH}:/secrets/gcp-key.json
    env_file:
      - .env_encoded
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-key.json
      # when you are running this file replace the SECRET_GITHUB_ACCESS_TOKEN with
      # the line in .env file in the same workflow folder. Since hithub would
      # not let me add this file to repo with this passcode I am changing this to a dummy variable here
      # see this: https://kestra.io/docs/how-to-guides/google-credentials
      # and this https://www.youtube.com/watch?v=u0yuOYG-qMI
      # GCP_KEY_PATh and GOOGLE_APPLICATION_CREDENTIALS did not work for me, so I am using the method of mounting the key file to the container 
      # and then setting the env variable to point to that file. This way I can keep the key file out of the repo and still have it available to the container at runtime.
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U kestra"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  postgres-data:
  kestra-data: